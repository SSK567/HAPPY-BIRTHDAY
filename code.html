<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Happy Birthday Cake Animation</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
      opacity: 1;
    }
    20%, 22%, 24%, 55% {
      opacity: 0.4;
    }
  }
  .flicker {
    animation: flicker 1.5s infinite;
  }

  /* Sparkle effect */
  .sparkle {
    position: absolute;
    background: radial-gradient(white, rgba(255, 255, 255, 0));
    border-radius: 50%;
    pointer-events: none;
    filter: drop-shadow(0 0 8px #ffffffcc);
    opacity: 0.8;
    animation: sparkleMove 3s infinite ease-in-out alternate;
  }

  @keyframes sparkleMove {
    0% {
      transform: translateY(0) scale(1);
      opacity: 0.8;
    }
    100% {
      transform: translateY(-20px) scale(1.5);
      opacity: 0;
    }
  }

  /* Candle flames stylized */
  .candle-flame {
    position: relative;
    width: 10px;
    height: 20px;
    margin: 0 auto 4px auto;
    background: radial-gradient(ellipse at center, #ffdb4d 35%, #e67300 90%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    filter: drop-shadow(0 0 3px rgba(255, 153, 0, 0.9));
    animation: flameMove 1.2s infinite ease-in-out alternate;
  }
  .candle-flame::before {
    content: "";
    position: absolute;
    top: 3px;
    left: 2px;
    width: 6px;
    height: 14px;
    background: radial-gradient(ellipse at center, #fff5b1 40%, #ff9900 90%);
    border-radius: 50% 50% 50% 50% / 70% 70% 40% 40%;
    filter: drop-shadow(0 0 5px #ffd966);
    animation: innerFlameMove 1.2s infinite ease-in-out alternate;
  }

  @keyframes flameMove {
    0%, 100% {
      transform: scaleY(1);
      opacity: 1;
      filter: drop-shadow(0 0 3px rgba(255, 153, 0, 0.85));
    }
    50% {
      transform: scaleY(1.15) translateY(-2px);
      opacity: 0.9;
      filter: drop-shadow(0 0 6px rgba(255, 204, 0, 1));
    }
  }

  @keyframes innerFlameMove {
    0%, 100% {
      transform: scaleY(1);
      opacity: 1;
      filter: drop-shadow(0 0 5px #ffd966);
    }
    50% {
      transform: scaleY(1.2) translateY(-1.5px);
      opacity: 0.85;
      filter: drop-shadow(0 0 8px #ffec8b);
    }
  }

  /* Rainbow cake colors slicing */
  .cake-layer {
    height: 45px;
    width: 300px;
    border-radius: 8px;
  }
  .red { background: #e63946; }
  .orange { background: #f4a261; }
  .yellow { background: #ffe066; }
  .green { background: #81b29a; }
  .blue { background: #4895ef; }
  .indigo { background: #6a4c93; }
  .violet { background: #9d4edd; }

  /* Layer spacing */
  .layer-container {
    margin: 2px 0;
  }

  /* Candles container on top */
  .candles {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: -10px;
  }

  /* Letter candle styling */
  .candle-letter {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 26px;
    width: 24px;
    text-transform: uppercase;
    user-select: none;
    color: white;
    filter: drop-shadow(0 0 2px black);
  }

  /* Candle stick below letter */
  .candle-stick {
    width: 2px;
    height: 20px;
    background: linear-gradient(180deg, #fff 0%, #b3521e 90%);
    margin: 2px auto 0 auto;
    border-radius: 1px;
  }

  /* Light bulbs string at top */
  .light-string {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 32px;
  }
  .light-bulb {
    width: 24px;
    height: 40px;
    border-radius: 12px 12px 3px 3px;
    background: linear-gradient(135deg, #fff8b6 0%, #ffed47 70%);
    box-shadow: 0 0 8px 3px #fffbb0;
    position: relative;
    animation: bulbGlow 2.5s infinite alternate;
  }
  /* Different animation delays for string bulbs flashing */
  .light-bulb:nth-child(1) { animation-delay: 0s; background: #ff6b6b; box-shadow: 0 0 10px 5px #ff6b6bcc; }
  .light-bulb:nth-child(2) { animation-delay: 0.5s; background: #ffb347; box-shadow: 0 0 9px 4px #ffb347cc; }
  .light-bulb:nth-child(3) { animation-delay: 1s; background: #f7f48b; box-shadow: 0 0 8px 4px #f7f48bcc; }
  .light-bulb:nth-child(4) { animation-delay: 1.5s; background: #8ee4af; box-shadow: 0 0 7px 4px #8ee4afcc; }
  .light-bulb:nth-child(5) { animation-delay: 2s; background: #6a4c93; box-shadow: 0 0 12px 6px #6a4c93cc; }
  .light-bulb:nth-child(6) { animation-delay: 2.5s; background: #f48fb1; box-shadow: 0 0 11px 5px #f48fb1cc; }

  @keyframes bulbGlow {
    0%, 100% {
      filter: brightness(1.2) drop-shadow(0 0 5px currentColor);
      opacity: 1;
    }
    50% {
      filter: brightness(0.75) drop-shadow(0 0 20px currentColor);
      opacity: 0.6;
    }
  }

  /* Center cake stand */
  .cake-stand {
    width: 320px;
    height: 60px;
    background: linear-gradient(to bottom, #fefefe, #cfcfcf);
    border-radius: 0 0 40px 40px;
    margin: auto;
    box-shadow: 0 6px 12px rgb(0 0 0 / 0.25);
  }

  /* Overall container */
  body {
    background: radial-gradient(circle at center, #11121b, #0a0a10 80%);
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 20px;
    user-select: none;
  }

  .container {
    text-align: center;
    position: relative;
  }

  /* Sparkle random positions */
  #sparkles-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: visible;
    z-index: 20;
  }
</style>
</head>
<body>
<div class="container" aria-label="Colorful rainbow birthday cake with candles spelling Happy Birthday with candle flames flickering and sparkling stars">
  <div class="light-string" aria-hidden="true" role="presentation">
    <div class="light-bulb"></div>
    <div class="light-bulb"></div>
    <div class="light-bulb"></div>
    <div class="light-bulb"></div>
    <div class="light-bulb"></div>
    <div class="light-bulb"></div>
  </div>

  <div class="candles" aria-label="Birthday candles spelling out Happy Birthday" role="list">
    <!-- Letters and flames, each candle as role listitem -->
    <div class="candle-letter" role="listitem" aria-label="Candle letter H">
      <div class="candle-flame flicker"></div>
      H
      <div class="candle-stick"></div>
    </div>
    <div class="candle-letter" role="listitem" aria-label="Candle letter A">
      <div class="candle-flame flicker" style="animation-delay: 0.2s"></div>
      A
      <div class="candle-stick"></div>
    </div>
    <div class="candle-letter" role="listitem" aria-label="Candle letter P">
      <div class="candle-flame flicker" style="animation-delay: 0.4s"></div>
      P
      <div class="candle-stick"></div>
    </div>
    <div class="candle-letter" role="listitem" aria-label="Candle letter P">
      <div class="candle-flame flicker" style="animation-delay: 0.6s"></div>
      P
      <div class="candle-stick"></div>
    </div>
    <div class="candle-letter" role="listitem" aria-label="Candle letter Y">
      <div class="candle-flame flicker" style="animation-delay: 0.8s"></div>
      Y
      <div class="candle-stick"></div>
    </div>
    <div style="width: 18px;"></div> <!-- Spacer between words -->
    <div class="candle-letter" role="listitem" aria-label="Candle letter B">
      <div class="candle-flame flicker" style="animation-delay: 0.1s"></div>
      B
      <div class="candle-stick"></div>
    </div>
    <div class="candle-letter" role="listitem" aria-label="Candle letter I">
      <div class="candle-flame flicker" style="animation-delay: 0.3s"></div>
      I
      <div class="candle-stick"></div>
    </div>
    <div class="candle-letter" role="listitem" aria-label="Candle letter R">
      <div class="candle-flame flicker" style="animation-delay: 0.5s"></div>
      R
      <div class="candle-stick"></div>
    </div>
    <div class="candle-letter" role="listitem" aria-label="Candle letter T">
      <div class="candle-flame flicker" style="animation-delay: 0.7s"></div>
      T
      <div class="candle-stick"></div>
    </div>
    <div class="candle-letter" role="listitem" aria-label="Candle letter H">
      <div class="candle-flame flicker" style="animation-delay: 0.9s"></div>
      H
      <div class="candle-stick"></div>
    </div>
    <div class="candle-letter" role="listitem" aria-label="Candle letter D">
      <div class="candle-flame flicker" style="animation-delay: 1.1s"></div>
      D
      <div class="candle-stick"></div>
    </div>
    <div class="candle-letter" role="listitem" aria-label="Candle letter A">
      <div class="candle-flame flicker" style="animation-delay: 1.3s"></div>
      A
      <div class="candle-stick"></div>
    </div>
    <div class="candle-letter" role="listitem" aria-label="Candle letter Y">
      <div class="candle-flame flicker" style="animation-delay: 1.5s"></div>
      Y
      <div class="candle-stick"></div>
    </div>
  </div>

  <div aria-label="Rainbow layered birthday cake" role="img" aria-describedby="cakeDesc">
    <div class="layer-container"><div class="cake-layer red"></div></div>
    <div class="layer-container"><div class="cake-layer orange"></div></div>
    <div class="layer-container"><div class="cake-layer yellow"></div></div>
    <div class="layer-container"><div class="cake-layer green"></div></div>
    <div class="layer-container"><div class="cake-layer blue"></div></div>
    <div class="layer-container"><div class="cake-layer indigo"></div></div>
    <div class="layer-container"><div class="cake-layer violet"></div></div>
  </div>
  <div class="cake-stand" aria-hidden="true"></div>

  <!-- Sparkles container -->
  <div id="sparkles-container" aria-hidden="true"></div>
</div>

<script>
  // JS to create random sparkle elements around cake

  const sparkleContainer = document.getElementById('sparkles-container');
  const sparkleCount = 60;

  function randomBetween(min, max) {
    return Math.random() * (max - min) + min;
  }

  for (let i = 0; i < sparkleCount; i++) {
    let sparkle = document.createElement('div');
    sparkle.classList.add('sparkle');
    let size = randomBetween(4, 10);
    sparkle.style.width = size + 'px';
    sparkle.style.height = size + 'px';

    // Random starting position within the container
    sparkle.style.top = randomBetween(10, 270) + 'px';
    sparkle.style.left = randomBetween(40, 280) + 'px';

    sparkle.style.animationDelay = (Math.random() * 3) + 's';
    sparkle.style.animationDuration = (randomBetween(2, 4)) + 's';

    sparkleContainer.appendChild(sparkle);
  }
</script>
</body>
</html>
